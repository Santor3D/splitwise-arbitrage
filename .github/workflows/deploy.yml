name: Build and deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/santor3d/splitwise-arbitrage

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install
        run: python -m pip install -e ".[dev]"

      - name: Test
        run: python -m pytest -q

  build-and-deploy:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:main
            ${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Prepare SSH key
        shell: bash
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "${{ secrets.ORACLE_SSH_KEY }}" > ~/.ssh/oracle_key
          chmod 600 ~/.ssh/oracle_key
          ssh-keyscan -p "${{ secrets.ORACLE_SSH_PORT || '22' }}" "${{ secrets.ORACLE_SSH_HOST }}" >> ~/.ssh/known_hosts

      - name: Upload compose file
        shell: bash
        run: |
          APP_DIR="${{ secrets.ORACLE_APP_DIR }}"
          SSH_PORT="${{ secrets.ORACLE_SSH_PORT || '22' }}"
          ssh -i ~/.ssh/oracle_key -p "$SSH_PORT" "${{ secrets.ORACLE_SSH_USER }}@${{ secrets.ORACLE_SSH_HOST }}" "mkdir -p '$APP_DIR/state'"
          scp -i ~/.ssh/oracle_key -P "$SSH_PORT" deploy/docker-compose.prod.yml "${{ secrets.ORACLE_SSH_USER }}@${{ secrets.ORACLE_SSH_HOST }}:$APP_DIR/docker-compose.yml"

      - name: Deploy on Oracle server
        shell: bash
        run: |
          APP_DIR="${{ secrets.ORACLE_APP_DIR }}"
          SSH_PORT="${{ secrets.ORACLE_SSH_PORT || '22' }}"
          IMAGE="${{ env.IMAGE_NAME }}:${{ github.sha }}"
          ssh -i ~/.ssh/oracle_key -p "$SSH_PORT" "${{ secrets.ORACLE_SSH_USER }}@${{ secrets.ORACLE_SSH_HOST }}" bash -s <<EOF
            set -euo pipefail
            cd "$APP_DIR"
            test -f .env
            echo "IMAGE=$IMAGE" > .deploy.env
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
            docker compose --env-file .deploy.env pull
            docker compose --env-file .deploy.env up -d
            docker image prune -f
          EOF
